<script>

let isLogin = true;

function openProfile(){
  let currentUser = localStorage.getItem("currentUser");
  let data = JSON.parse(localStorage.getItem("userData"));

  if(currentUser && data){

    document.getElementById("profileName").innerText = data.username;
    document.getElementById("highScore").innerText = data.highScore;
    document.getElementById("playCount").innerText = data.playCount;
    document.getElementById("avatarImage").src = data.avatar || "";

    document.getElementById("profilePopup").style.display="flex";

  } else {
    openLogin();
  }
}

function changeName(){
  let data = JSON.parse(localStorage.getItem("userData"));
  let newName = document.getElementById("newName").value;

  if(newName){
    data.username = newName;
    localStorage.setItem("userData", JSON.stringify(data));
    alert("เปลี่ยนชื่อแล้ว");
    openProfile();
  }
}

function closeProfile(){
  document.getElementById("profilePopup").style.display="none";
}

function logout(){
  localStorage.removeItem("currentUser");
  alert("ออกจากระบบแล้ว");
  closeProfile();
}

function openLogin(){
  document.getElementById("loginPopup").style.display="flex";
}

function closeLogin(){
  document.getElementById("loginPopup").style.display="none";
}

function switchForm(){
  isLogin = !isLogin;

  if(isLogin){
    formTitle.innerText = "Login";
    mainBtn.innerText = "เข้าสู่ระบบ";
    switchText.innerHTML = `
      ยังไม่มีบัญชี?
      <span onclick="switchForm()" style="color:#00ffcc; cursor:pointer;">
        สมัครสมาชิก
      </span>
    `;
  } else {
    formTitle.innerText = "Register";
    mainBtn.innerText = "สมัครสมาชิก";
    switchText.innerHTML = `
      มีบัญชีแล้ว?
      <span onclick="switchForm()" style="color:#00ffcc; cursor:pointer;">
        เข้าสู่ระบบ
      </span>
    `;
  }
}

function submitForm(){

  let user = document.getElementById("username").value;
  let pass = document.getElementById("password").value;

  if(!user || !pass){
    alert("กรอกข้อมูลให้ครบก่อน");
    return;
  }

  let savedData = JSON.parse(localStorage.getItem("userData"));

  if(isLogin){

    // ===== LOGIN =====
    if(savedData &&
       savedData.username === user &&
       savedData.password === pass){

        localStorage.setItem("currentUser", user);
        alert("เข้าสู่ระบบสำเร็จ!");
        closeLogin();
        openProfile();
    }else{
        alert("ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง");
    }

  }else{

    // ===== REGISTER =====
    let userData = {
      username: user,
      password: pass,
      highScore: 0,
      playCount: 0,
      avatar: "👤"
    };

    localStorage.setItem("userData", JSON.stringify(userData));
    alert("สมัครสมาชิกสำเร็จ!");
    switchForm();

  }
}

// START
function startCountdown(callback){

let count=3

countdown.style.opacity=1

countdown.innerHTML=count

countSound.play()

countdown.classList.add("countAnim")

let interval=setInterval(()=>{

count--

if(count>0){

countdown.innerHTML=count

countSound.currentTime=0
countSound.play()

countdown.classList.remove("countAnim")
void countdown.offsetWidth
countdown.classList.add("countAnim")

}
else if(count==0){

countdown.innerHTML="START!"

startSound.play()

countdown.classList.remove("countAnim")
void countdown.offsetWidth
countdown.classList.add("countAnim")

}
else{

clearInterval(interval)

countdown.style.opacity=0

callback()

}

},1000)

}

}

// ANSWER

score+=10

correctSound.play()

}else{

result.innerHTML="❌ ผิด<br>"+q.info

}

current++


setTimeout(()=>{

if(current>=questions.length){

endGame()

}else{

showQuestion()

}

},2000)

}



// END GAME

end.style.display="flex"

menuMusic.play()

}
else if(score>=30){

else if(score>=10){

let mineSize = 10
let mineMap = []

let inventory = {}
let recipes=[

{
name:"⚙️ Steel",
need:{
"Iron":2,
"Coal":1
}
},

{

function hasItems(need){

for(let item in need){

if(!inventory[item] || inventory[item]<need[item]){

return false

}

}

return true

}
function renderCraft(){

let html=""

recipes.forEach((r,i)=>{

let can=hasItems(r.need)

html+=`
<div class="craftItem ${can?'can':'cant'}">

<div onclick="showRecipe(${i})">
${r.name}
</div>

<button class="craftBtn"
onclick="craftItem(${i})"
${can?'':'disabled'}>
Craft
</button>

</div>
`

})

document.getElementById("craftList").innerHTML=html

}
function showRecipe(i){

let r=recipes[i]

let text=`<b>${r.name}</b><br><br>`

for(let item in r.need){

text+=`${item} x${r.need[item]}<br>`

}

document.getElementById("craftRecipe").innerHTML=text

}
function craftItem(i){

let r=recipes[i]

if(!hasItems(r.need)) return

for(let item in r.need){

inventory[item]-=r.need[item]

}

if(!inventory[r.name]) inventory[r.name]=0

inventory[r.name]++

renderInventory()
renderLabInventory()
renderCraft()

}
const minerals = [

"🪨","🪨","🪨","🪨","🪨",

"⚫ Coal",

"🟤 Copper",

"⚙️ Iron",

"🥇 Gold",

"💎 Diamond",

"☢️ Uranium"

]

function randomMineral(){

let r=Math.random()

if(r<0.55) return "🪨"
if(r<0.70) return "⚫ Coal"
if(r<0.82) return "🟤 Copper"
if(r<0.92) return "⚙️ Iron"
if(r<0.97) return "🥇 Gold"
if(r<0.995) return "💎 Diamond"

return "☢️ Uranium"

}

function generateMine(){

mineMap=[]

for(let y=0;y<mineSize;y++){

let row=[]

for(let x=0;x<mineSize;x++){

row.push(randomMineral())

}

mineMap.push(row)

}

renderMine()

}

function renderMine(){

let grid=document.getElementById("mineGrid")

grid.innerHTML=""

for(let y=0;y<mineSize;y++){

for(let x=0;x<mineSize;x++){

let block=document.createElement("div")

block.className="mineBlock"

block.innerHTML="⬜"

block.onclick=function(){

mine(x,y)

}

grid.appendChild(block)

}

}

}

function mine(x,y){

let mineral = mineMap[y][x]

if(!mineral){
alert("⏳ กำลังเกิดใหม่...")
return
}

alert("คุณขุดเจอ "+mineral)

let name = mineral.replace(/[^a-zA-Z]/g,"").trim()

if(!inventory[name]) inventory[name]=0
inventory[name]++

mineMap[y][x] = null

renderInventory()

setTimeout(()=>{
mineMap[y][x] = randomMineral()
renderMine()
},5000)

}

function renderInventory(){

let inv = document.getElementById("inventory")

inv.innerHTML=""

for(let item in inventory){

inv.appendChild(slot)

}

function renderLabInventory(){

}

let firstCard=null;
let lockBoard=false;
let matchCount = 0;

function initMatchingGame(){

  const chemicals=[
    "H₂O","NaCl","CO₂","O₂","H₂","NH₃","CH₄","HCl","NaOH","KCl",
    "CaCO₃","MgO","SO₂","NO₂","C₂H₆","C₂H₄","H₂SO₄","HNO₃","Na₂CO₃","KOH"
  ];

  const pairs=[...chemicals,...chemicals]; // ทำให้เป็น 20 คู่

  const shuffled=pairs.sort(()=>0.5-Math.random());

  const grid=document.getElementById("matchGrid");
  grid.innerHTML="";

  shuffled.forEach(text=>{

    const card=document.createElement("div");
    card.classList.add("card");

    card.dataset.value=text;
    card.innerText="?";

    card.onclick=()=>flipCard(card);

    grid.appendChild(card);

  });
  matchCount = 0;
  firstCard=null;
  lockBoard=false;
}

function flipCard(card){

  if(lockBoard || card.classList.contains("flipped")) return;

  card.classList.add("flipped");
  card.innerText=card.dataset.value;

  if(!firstCard){
    firstCard=card;
    return;
  }

  if(firstCard.dataset.value===card.dataset.value){

    firstCard.classList.add("matched");
    card.classList.add("matched");

    correctSound.currentTime = 0;
    correctSound.play();

    matchCount++;

    if(matchCount===20){
        setTimeout(()=>{
            alert("🎉 คุณจับคู่สารเคมีครบแล้ว!");
            goToModeSelect();
        },500);
    }

    firstCard=null;
    
  }else{

    wrongSound.currentTime = 0;
    wrongSound.play();

    lockBoard = true;

    setTimeout(()=>{

        card.classList.remove("flipped");
        firstCard.classList.remove("flipped");

        card.innerText="?";
        firstCard.innerText="?";

        firstCard=null;
        lockBoard=false;

    },800);

}

}
