    <script>

    /* ===================== */
    /* PARTICLE EFFECT */
    /* ===================== */

    let canvas=document.getElementById("particles")
    let ctx=canvas.getContext("2d")

    canvas.width=window.innerWidth
    canvas.height=window.innerHeight

    let particles=[]

    for(let i=0;i<60;i++){

    particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*3+1,
    v:Math.random()*0.5+0.2
    })

    }

    function animateParticles(){

    ctx.clearRect(0,0,canvas.width,canvas.height)

    particles.forEach(p=>{

    ctx.beginPath()
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2)
    ctx.fillStyle="rgba(0,255,255,0.7)"
    ctx.shadowBlur=10
    ctx.shadowColor="cyan"
    ctx.fill()

    p.y-=p.v

    if(p.y<0){
    p.y=canvas.height
    p.x=Math.random()*canvas.width
    }

    })

    requestAnimationFrame(animateParticles)

    }

    animateParticles()

    let isLogin=true

    function openProfile(){

    let current=localStorage.getItem("currentUser")

    if(current){

    let users=JSON.parse(localStorage.getItem("users"))

    let data=users[current]

    nameInput.value=data.username
    avatarImage.src=data.avatar || ""

    gamesPlayed.innerText=data.gamesPlayed || 0
    playerLevel.innerText=data.level || 1

    profilePopup.style.display="flex"

    }else{

    loginPopup.style.display="flex"

    }

    }

    function closeLogin(){
    loginPopup.style.display="none"
    }

    function closeProfile(){
    profilePopup.style.display="none"
    }

    function switchForm(){

    isLogin=!isLogin

    if(isLogin){

    formTitle.innerText="Login"
    mainBtn.innerText="เข้าสู่ระบบ"

    switchText.innerHTML=`ยังไม่มีบัญชี?
    <span onclick="switchForm()" style="color:cyan;cursor:pointer">สมัครสมาชิก</span>`

    }else{

    formTitle.innerText="Register"
    mainBtn.innerText="สมัครสมาชิก"

    switchText.innerHTML=`มีบัญชีแล้ว?
    <span onclick="switchForm()" style="color:cyan;cursor:pointer">เข้าสู่ระบบ</span>`

    }

    }

    function submitForm(){

    let user=username.value
    let pass=password.value

    if(!user || !pass){

    alert("กรอกข้อมูลให้ครบ")
    return

    }

    let users=JSON.parse(localStorage.getItem("users")) || {}

    if(isLogin){

    if(users[user] && users[user].password===pass){

    localStorage.setItem("currentUser",user)

    alert("Login สำเร็จ")
    closeLogin()
    lobby.style.display="block"

    }else{

    alert("ข้อมูลไม่ถูกต้อง")

    }

    }else{

    if(users[user]){

    alert("Username ถูกใช้แล้ว")
    return

    }

    users[user]={

    username:user,
    password:pass,
    avatar:"",

    gamesPlayed:0,
    level:1

    }

    localStorage.setItem("users",JSON.stringify(users))

    alert("สมัครสำเร็จ")

    switchForm()

    }

    }

    function logout(){

localStorage.removeItem("currentUser")
closeProfile()

lobby.style.display="none"
loginPopup.style.display="flex"

}

/* ===================== */
/* BUBBLE EFFECT */
/* ===================== */

function createBubble(){

let bubble=document.createElement("div")

bubble.style.position="absolute"
bubble.style.width="8px"
bubble.style.height="8px"
bubble.style.borderRadius="50%"
bubble.style.background="white"
bubble.style.bottom="60px"

/* ฟองออกจากขั้วไฟฟ้า */

let side=Math.random()

if(side<0.5){
bubble.style.left="70px"   // ขั้วซ้าย
}else{
bubble.style.left="120px"  // ขั้วขวา
}

bubble.style.animation="rise 3s linear"

document.querySelector(".beaker").appendChild(bubble)

setTimeout(()=>bubble.remove(),3000)

}

let currentAnswer=""
let currentHint=""

function showQuestion(q,answer,hint){

questionBox.style.display="block"
questionText.innerText=q

currentAnswer=answer
currentHint=hint

hintText.innerText=""

}

function checkAnswer(){

let ans=answerInput.value.toLowerCase()

if(ans.includes(currentAnswer)){
alert("Correct! 🎉")
}else{
alert("Not quite. Correct answer: "+currentAnswer)
}

questionBox.style.display="none"
answerInput.value=""

}

function showHint(){

hintText.innerText="Hint: "+currentHint

}
